services:
  # 🚀 Travoss Backend (Node.js Express)
  - type: web
    name: travoss-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
        # Put your MongoDB Atlas connection string here or set it in Render dashboard
        placeholder: mongodb+srv://<username>:<password>@cluster.mongodb.net/travoss
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # 🎨 Travoss Frontend (React Static)
  - type: static
    name: travoss-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        # Note: Render will fill this after backend is created.
        # Below is the predicted URL based on service name "travoss-backend"
        value: https://travoss-backend.onrender.com/api
